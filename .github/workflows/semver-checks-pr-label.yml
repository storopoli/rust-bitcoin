on:   # yamllint disable-line rule:truthy
  workflow_run:
    workflows: [Check semver breaks]
    types: [completed]

name: Check semver breaks - Label and Comment PR

jobs:
  Download:
    name: Download, Unzip and Add Labels/Comments
    runs-on: ubuntu-latest
    steps:
      - name: "Download artifact"
        uses: actions/github-script@v7
        with:
          script: |
            let fs = require('fs');
            let allArtifacts = await github.actions.listWorkflowRunArtifacts({
               owner: context.repo.owner,
               repo: context.repo.repo,
               run_id: context.payload.workflow_run.id,
            });
            let matchArtifacts = allArtifacts.data.artifacts.filter((artifact) => {
              return artifact.name.startsWith('pr');
            });
            for (let artifact of matchArtifacts) {
              console.log(artifact.name);
              let download = await github.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: matchArtifact.id,
                archive_format: 'zip',
              });
              fs.writeFileSync('${{github.workspace}}/' + artifact.name + '.zip', Buffer.from(download.data));
            }
      - name: "Unzip artifact(s)"
        run: unzip pr*.zip

      - name: "Comment and add label on PR - Semver break"
        uses: actions/github-script@v7
        if: ${{ hashFiles('semver-break-NR') != '' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            var fs = require('fs');
            var issue_number = Number(fs.readFileSync('./semver-break-NR'));
            await github.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: ':rotating_light: API BREAKING CHANGE DETECTED'
            });
            await github.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              labels: ['API break']
            });
      - name: "Comment and add label on PR - Semver break"
        uses: actions/github-script@v7
        if: ${{ hashFiles('non-additive-cargo-NR') != '' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            var fs = require('fs');
            var issue_number = Number(fs.readFileSync('./non-additive-cargo-NR'));
            await github.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: ':rotating_light: NON-ADDITIVE CARGO FEATURES DETECTED'
            });
            await github.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              labels: ['non-additive cargo features']
            });
