on:   # yamllint disable-line rule:truthy
  pull_request:

name: Check semver breaks

jobs:
  Prepare:
    runs-on: ubuntu-latest
    outputs:
      stable_version: ${{ steps.read_toolchain.outputs.stable_version }}
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Read stable version"
        id: read_toolchain
        run: echo "stable_version=$(cat ./.github/workflows/stable-version)" >> $GITHUB_OUTPUT

  PR:
    name: PR Semver - stable toolchain
    needs: Prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # we need full history for cargo semver-checks
      - name: "Install Rustup"
        uses: dtolnay/rust-toolchain@stable
      - name: "Select stable-version"
        run: |
          rustup default $(cat ./.github/workflows/stable-version)
      - name: "Install cargo-binstall"
        uses: cargo-bins/cargo-binstall@main
      - name: "Binstall cargo-semver-checks"
        run: cargo binstall cargo-semver-checks --no-confirm
      - name: "Run semver checker script"
        run: ./contrib/check-semver-pr.sh
      - name: "Add PR label to breaking changes"
        uses: actions-ecosystem/action-add-labels@v1
        if: ${{ hashFiles('semver-break') != '' }}
        with:
          labels: "API break"
      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        if: ${{ hashFiles('semver-break') != '' }}
        with:
          message: |
            :rotating_light: API BREAKING CHANGE DETECTED

  Feature:
    name: Non additive cargo features - stable toolchain
    needs: Prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Install Rustup"
        uses: dtolnay/rust-toolchain@stable
      - name: "Select stable-version"
        run: |
          rustup default $(cat ./.github/workflows/stable-version)
      - name: "Install cargo-binstall"
        uses: cargo-bins/cargo-binstall@main
      - name: "Binstall cargo-semver-checks"
        run: cargo binstall cargo-semver-checks --no-confirm
      - name: "Run semver checker script"
        run: ./contrib/check-semver-feature.sh
        continue-on-error: true
      - name: "Add PR label to breaking changes"
        uses: actions-ecosystem/action-add-labels@v1
        if: ${{ hashFiles('non-additive-cargo') != '' }}
        with:
          labels: "non-additive cargo features"
      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        if: ${{ hashFiles('non-additive-cargo') != '' }}
        with:
          message: |
            :rotating_light: Non-additive Cargo Features
